kind = "web"
previewPath = "/"
title = "SecurityAI"
version = "1.0.0"
id = "artifacts/security-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24807

[services.development]
run = "pnpm --filter @workspace/security-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/security-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/security-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24807"
BASE_PATH = "/"
